<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Linko – Chat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f3f4f6;color:#00142f}
    .header{background:#1f5cf0;color:white;padding:2rem;border-radius:0 0 24px 24px}
    .top{display:flex;justify-content:space-between;align-items:center}
    .avatar{width:48px;height:48px;border-radius:50%;background:#dbeafe;color:#1f5cf0;display:flex;align-items:center;justify-content:center;font-weight:bold}
    .badge{background:#dbeafe;color:#1f5cf0;padding:.25rem .6rem;border-radius:20px;font-size:.8rem;margin-top:.4rem;display:inline-block}
    .chat-box{padding:1.2rem;margin-bottom:80px}
    .msg{max-width:75%;padding:.8rem 1rem;border-radius:16px;margin:.7rem 0;line-height:1.4}
    .left{background:white;border:1px solid #e5e7eb}
    .right{background:#1f5cf0;color:white;margin-left:auto}
    .translated{font-size:.82rem;color:#6b7280;margin-top:.45rem;border-top:1px solid #ddd;padding-top:.4rem}
    .right .translated{color:#dbeafe;border-top:1px solid rgba(255,255,255,.4)}
    .controls{background:white;border-radius:16px;padding:1rem;margin-top:1rem;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    .toggle{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;color:#1f5cf0;font-weight:bold}
    textarea{width:100%;padding:.8rem;border:1px solid #ccc;border-radius:10px;resize:none;font-family:Arial}
    button{border:none;border-radius:10px;padding:.75rem 1rem;cursor:pointer;font-weight:bold}
    .btn-blue{background:#1f5cf0;color:white;width:100%;margin-top:.7rem}
    .btn-light{background:#eaf1ff;color:#1f5cf0;width:100%;margin-top:.7rem}
    .icebreaker{background:#eef4ff;border-left:4px solid #1f5cf0;border-radius:10px;padding:.8rem;margin-top:.8rem;display:none}
    .nav{position:fixed;bottom:0;left:0;right:0;height:70px;background:white;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #ddd}
    .nav div{text-align:center;color:#6b7280;font-size:.8rem}
    .nav .active{color:#1f5cf0;font-weight:bold}
  </style>
</head>
<body>

<div class="header">
  <div class="top">
    <div>
      <p>Chat with</p>
      <h1>Marko</h1>
      <span class="badge">🎓 Architecture · Zagreb</span>
    </div>
    <div class="avatar">M</div>
  </div>
</div>

<div class="chat-box">
  <div class="msg left">
    Bok Lucas! Jesi li već bio na studentskoj izložbi?
    <div class="translated prijevod">Hi Lucas! Have you already been to the student exhibition?</div>
  </div>

  <div class="msg right">
    Not yet, but I would like to go.
    <div class="translated prijevod">Još nisam, ali volio bih ići.</div>
  </div>

  <div id="poruke"></div>

  <div class="controls">
    <label class="toggle">
      <input type="checkbox" id="translateToggle" checked onchange="togglePrijevod()">
      🌍 Automatski prijevod uključen
    </label>

    <button class="btn-light" onclick="generirajIcebreaker()">✨ Predloži temu razgovora</button>
    <div class="icebreaker" id="icebreakerBox"></div>

    <textarea id="novaPoruka" rows="3" placeholder="Napiši poruku..."></textarea>
    <button class="btn-blue" onclick="posaljiPoruku()">Pošalji poruku</button>
  </div>
</div>

<div class="nav">
  <div>🏠<br>Home</div>
  <div>👥<br>Discover</div>
  <div class="active">💬<br>Chat</div>
  <div>✈️<br>Erasmus</div>
  <div>👤<br>Profile</div>
</div>

<script src="chat.js"></script>
</body>
</html>
