<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linko – Registracija</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .kartica {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,.1);
            width: 100%;
            max-width: 420px;
        }

        .logo {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1F5C99;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .logo span { color: #333; font-size: 1rem; display: block; font-weight: normal; margin-top: .25rem; }

        label {
            display: block;
            font-size: .85rem;
            color: #555;
            margin-bottom: .25rem;
            margin-top: 1rem;
        }

        input, select {
            width: 100%;
            padding: .6rem .8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1F5C99;
            box-shadow: 0 0 0 2px rgba(31,92,153,.1);
        }

        .hint {
            font-size: .75rem;
            color: #999;
            margin-top: .2rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: .75rem;
            background: #1F5C99;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
        }

        .btn:hover { background: #174d82; }

        .poruka {
            padding: .75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: .9rem;
            display: none;
        }

        .greska { background: #fde8e8; color: #c0392b; }
        .uspjeh { background: #e8f8f0; color: #1e8449; }

        .link {
            text-align: center;
            margin-top: 1rem;
            font-size: .875rem;
            color: #666;
        }

        .link a { color: #1F5C99; text-decoration: none; }
        .link a:hover { text-decoration: underline; }

        /* Tip korisnika toggle */
        .tip-group {
            display: flex;
            gap: .5rem;
            margin-top: .5rem;
        }

        .tip-group input[type="radio"] { display: none; }

        .tip-group label {
            flex: 1;
            text-align: center;
            padding: .55rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            cursor: pointer;
            margin: 0;
            font-size: .9rem;
            transition: all .15s;
            color: #555;
        }

        .tip-group input:checked + label {
            border-color: #1F5C99;
            background: #ebf5fb;
            color: #1F5C99;
            font-weight: bold;
        }

        /* Success state */
        .uspjeh-blok { display: none; text-align: center; padding: 1rem 0; }
        .uspjeh-blok .ikona { font-size: 3.5rem; }
        .uspjeh-blok h2 { color: #1e8449; margin: .75rem 0 .5rem; }
        .uspjeh-blok p { color: #555; font-size: .9rem; line-height: 1.6; }
        .uspjeh-blok .verify-link {
            display: inline-block;
            margin-top: 1rem;
            padding: .6rem 1.2rem;
            background: #1F5C99;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: .9rem;
        }
    </style>
</head>
<body>
<div class="kartica">
    <div class="logo">🔗 Linko <span>Spoji se sa studijem</span></div>

    <!-- Poruke -->
    <div id="poruka-greska" class="poruka greska"></div>

    <!-- Forma -->
    <div id="forma-wrap">
        <!-- Tip korisnika -->
        <label>Vrsta korisnika</label>
        <div class="tip-group">
            <input type="radio" id="tip-redovni" name="tip" value="redovni" checked>
            <label for="tip-redovni">🎓 Redovni student</label>

            <input type="radio" id="tip-erasmus" name="tip" value="erasmus">
            <label for="tip-erasmus">🌍 Erasmus student</label>
        </div>

        <label for="email">E-mail adresa institucije</label>
        <input type="email" id="email" placeholder="ime@student.tvz.hr">
        <p class="hint">Prihvaćamo: @student.tvz.hr, @student.unizg.hr, @student.foi.hr, @erasmus.foi.hr...</p>

        <label for="lozinka">Lozinka</label>
        <input type="password" id="lozinka" placeholder="Najmanje 8 znakova">

        <label for="potvrda">Potvrda lozinke</label>
        <input type="password" id="potvrda" placeholder="Ponovi lozinku">

        <button class="btn" onclick="registriraj()">Registriraj se</button>

        <p class="link">Već imaš račun? <a href="login.html">Prijavi se</a></p>
    </div>

    <!-- Uspjeh -->
    <div class="uspjeh-blok" id="uspjeh-blok">
        <div class="ikona">✅</div>
        <h2>Račun je kreiran!</h2>
        <p>Na tvoj e-mail smo poslali verifikacijski link.<br>Klikni link ispod kako bi potvrdio/la račun.</p>
        <a href="#" id="verify-link" class="verify-link">Simuliraj klik na link iz e-maila →</a>
    </div>
</div>

<script>
    const DOZVOLJENE_DOMENE = [
        'student.unizg.hr',
        'student.tvz.hr',
        'student.foi.hr',
        'student.fer.hr',
        'student.efos.hr',
        'erasmus.foi.hr',
        'erasmus.unizg.hr',
    ];

    function prikaziGresku(tekst) {
        const el = document.getElementById('poruka-greska');
        el.textContent = '⚠️ ' + tekst;
        el.style.display = 'block';
    }

    function sakriGresku() {
        document.getElementById('poruka-greska').style.display = 'none';
    }

    function provjeriDomenu(email) {
        const dio = email.split('@');
        if (dio.length !== 2) return false;
        return DOZVOLJENE_DOMENE.includes(dio[1].toLowerCase());
    }

    function generirajToken() {
        const niz = new Uint8Array(32);
        crypto.getRandomValues(niz);
        return Array.from(niz).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function registriraj() {
        sakriGresku();

        const tip      = document.querySelector('input[name="tip"]:checked').value;
        const email    = document.getElementById('email').value.trim();
        const lozinka  = document.getElementById('lozinka').value;
        const potvrda  = document.getElementById('potvrda').value;

        // Validacija
        if (!email || !lozinka || !potvrda) {
            prikaziGresku('Sva polja su obavezna.'); return;
        }
        if (!email.includes('@')) {
            prikaziGresku('Neispravna e-mail adresa.'); return;
        }
        if (!provjeriDomenu(email)) {
            prikaziGresku('E-mail mora biti s prepoznate institucije (npr. @student.tvz.hr).'); return;
        }
        if (lozinka.length < 8) {
            prikaziGresku('Lozinka mora imati najmanje 8 znakova.'); return;
        }
        if (lozinka !== potvrda) {
            prikaziGresku('Lozinke se ne podudaraju.'); return;
        }

        // Provjera duplikata u localStorage
        const korisnici = JSON.parse(localStorage.getItem('linko_korisnici') || '[]');
        if (korisnici.find(k => k.email === email)) {
            prikaziGresku('Korisnik s tim e-mailom već postoji.'); return;
        }

        // Kreiranje korisnika
        const token = generirajToken();
        korisnici.push({
            id: Date.now(),
            email,
            lozinka,   // U produkciji: bcrypt hash; ovdje plain za demo
            tip,
            verificiran: false,
            token
        });
        localStorage.setItem('linko_korisnici', JSON.stringify(korisnici));

        // Prikaz uspjeha i simuliranog linka iz e-maila
        document.getElementById('forma-wrap').style.display = 'none';
        const blok = document.getElementById('uspjeh-blok');
        blok.style.display = 'block';
        document.getElementById('verify-link').href = `verify.html?token=${token}`;
    }
</script>
</body>
</html>
