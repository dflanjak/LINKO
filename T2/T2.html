<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Linko – T2 Model podataka</title>
<!-- T2 – PRIKAZ MODELA. Zove T2.js. Obje datoteke moraju biti u istoj mapi (T2). -->
<style>
  :root { --bg:#f5f6fb; --surface:#fff; --ink:#1d2333; --muted:#6b7280; --line:#e6e8f0;
    --primary:#4f46e5; --primary-2:#7c6cf0; --accent:#f59e0b; --chip:#eef0fb; --err:#dc2626; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45; }
  .wrap { max-width:980px; margin:0 auto; padding:24px 16px 64px; }
  header.app { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:4px; }
  header.app .logo { font-size:28px; font-weight:800; letter-spacing:-.5px;
    background:linear-gradient(90deg,var(--primary),var(--primary-2));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  header.app .screen { color:var(--muted); font-size:14px; }
  .subtitle { color:var(--muted); font-size:14px; margin:0 0 20px; }
  .me { display:flex; gap:14px; align-items:center;
    background:linear-gradient(120deg,#eef0ff,#f7f5ff); border:1px solid var(--line);
    border-radius:14px; padding:14px 16px; margin-bottom:22px; }
  .me .ava { width:48px; height:48px; border-radius:50%; flex:0 0 48px; display:grid;
    place-items:center; font-weight:700; color:#fff; background:var(--primary); }
  .me .info b { font-size:15px; } .me .info span { color:var(--muted); font-size:13px; }
  h2.sec { font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 12px; }
  table { width:100%; border-collapse:collapse; background:var(--surface);
    border:1px solid var(--line); border-radius:14px; overflow:hidden; font-size:14px; }
  th, td { padding:11px 14px; text-align:left; border-bottom:1px solid var(--line); }
  th { background:#1f3b57; color:#fff; font-weight:600; font-size:13px; }
  tr:last-child td { border-bottom:0; }
  tr:nth-child(even) td { background:#f7f8fd; }
  .erasmus { background:var(--accent); color:#3a2700; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .tags span { display:inline-block; font-size:12px; background:var(--chip); border-radius:999px; padding:2px 8px; margin:2px 3px 2px 0; }
  .alert { background:#fff1f1; border:1px solid #fecaca; color:var(--err); border-radius:12px; padding:16px; font-size:14px; }
  footer.note { margin-top:24px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <span class="logo">Linko</span>
    <span class="screen">T2 &middot; Model podataka</span>
  </header>
  <p class="subtitle">Prikaz studentskih profila iz modela (R003: ime, smjer, godina, interesi, lokacija, status).</p>
  <div id="app"></div>
  <footer class="note">T2 (T2.js) &middot; Linko &middot; PRPP 2025./2026.</footer>
</div>

<script src="T2.js"></script>
<script>
  const app = document.getElementById("app");
  if (typeof currentUser === "undefined" || typeof students === "undefined") {
    app.innerHTML = `<div class="alert"><b>T2.js nije učitan.</b><br/>
      Provjeri da se datoteka zove točno <code>T2.js</code> i da je u istoj mapi kao T2.html.</div>`;
  } else {
    const inicijali = ime => ime.split(" ").map(d => d[0]).slice(0,2).join("");
    app.innerHTML = `
      <h2 class="sec">Trenutno prijavljeni korisnik</h2>
      <div class="me">
        <div class="ava">${inicijali(currentUser.ime)}</div>
        <div class="info">
          <b>${currentUser.ime}</b> ${currentUser.erasmus ? "· Erasmus" : ""}<br/>
          <span>${currentUser.smjer}, ${currentUser.godina}. godina · interesi: ${currentUser.interesi.join(", ")}</span>
        </div>
      </div>
      <h2 class="sec">Svi studenti u modelu</h2>
      <table>
        <thead><tr><th>#</th><th>Ime</th><th>Smjer</th><th>God.</th><th>Status</th><th>Interesi</th><th>Lokacija (GPS)</th></tr></thead>
        <tbody>
          ${students.map(s => `
            <tr><td>${s.id}</td><td>${s.ime}</td><td>${s.smjer}</td><td>${s.godina}.</td>
            <td>${s.erasmus ? '<span class="erasmus">Erasmus</span>' : 'Redovni'}</td>
            <td class="tags">${s.interesi.map(i => `<span>${i}</span>`).join("")}</td>
            <td>${s.lokacija.lat.toFixed(4)}, ${s.lokacija.lng.toFixed(4)}</td></tr>`).join("")}
        </tbody>
      </table>`;
  }
</script>
</body>
</html>
